<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking | TravelSphere</title>

<link rel="stylesheet" href="style.css">

<style>
body{
  background:#f5f5f5;
}

/* PAGE TITLE */
.page-title{
  text-align:center;
  padding:120px 20px 40px;
}

/* FORM BOX */
.booking-box{
  max-width:500px;
  margin:0 auto 80px;
  background:white;
  padding:30px;
  border-radius:20px;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

/* INPUT */
.booking-box input,
.booking-box select{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:1px solid #ddd;
}

/* BUTTON */
.book-btn{
  width:100%;
  padding:12px;
  background:#ff7eb3;
  color:white;
  border:none;
  border-radius:20px;
  font-size:16px;
  cursor:pointer;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<header>
  <div class="logo">TravelSphere</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="destinations.html">Destinations</a>
    <a href="#">Booking</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<!-- TITLE -->
<section class="page-title">
  <h1>Book Your Trip</h1>
  <p>Fill details to confirm booking</p>
</section>

<!-- FORM -->
<div class="booking-box">

  <input type="text" placeholder="Full Name" required>
  <input type="email" placeholder="Email" required>

  <select>
    <option>Select Destination</option>
    <option>Maldives</option>
    <option>Paris</option>
    <option>Dubai</option>
    <option>Bali</option>
  </select>

  <input type="date">
  <input type="number" placeholder="Number of People">

  <button class="book-btn" onclick="goToPayment()">Proceed to Payment</button>

</div>

<script>
function goToPayment(){
  alert("Booking Saved! Redirecting to Payment...");
  window.location.href = "paytm.html";
}
</script>

</body>
</html>
