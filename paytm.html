<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment | TravelSphere</title>

<link rel="stylesheet" href="style.css">

<style>
body{
  margin:0;
  font-family:'Poppins', sans-serif;
  background:linear-gradient(135deg,#4facfe,#00f2fe);
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

/* MAIN BOX */
.payment-box{
  width:380px;
  background:white;
  padding:25px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.payment-box h2{
  margin-bottom:15px;
}

/* METHODS */
.method{
  display:flex;
  align-items:center;
  gap:15px;
  padding:10px;
  margin:8px 0;
  border-radius:10px;
  background:#f5f5f5;
  cursor:pointer;
  transition:0.3s;
}

.method:hover{
  background:#eaeaea;
}

.method.active{
  border:2px solid #6a5af9;
  background:#eef0ff;
}

.method img{
  width:35px;
}

/* BUTTON */
.pay-btn{
  margin-top:15px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:25px;
  background:linear-gradient(45deg,#ff7eb3,#6a5af9);
  color:white;
  font-size:16px;
  cursor:pointer;
}

/* QR BOX */
.qr-box{
  margin-top:20px;
  text-align:center;
}

.qr-box img{
  width:180px;
  border-radius:10px;
  margin:10px 0;
}

.upi-btn{
  display:inline-block;
  margin-top:10px;
  padding:10px 20px;
  background:linear-gradient(45deg,#ff7eb3,#6a5af9);
  color:white;
  text-decoration:none;
  border-radius:20px;
}

/* SUCCESS */
.success{
  display:none;
  margin-top:15px;
  color:green;
  font-weight:bold;
}
</style>

</head>

<body>

<div class="payment-box">

  <h2>Select Payment Method</h2>

  <!-- METHODS -->
  <div class="method" onclick="selectMethod(this)">
    <img src="https://cdn-icons-png.flaticon.com/512/825/825454.png">
    <span>Paytm</span>
  </div>

  <div class="method" onclick="selectMethod(this)">
    <img src="https://cdn-icons-png.flaticon.com/512/5968/5968342.png">
    <span>PhonePe</span>
  </div>

  <div class="method" onclick="selectMethod(this)">
    <img src="https://cdn-icons-png.flaticon.com/512/6124/6124998.png">
    <span>Google Pay</span>
  </div>

  <!-- PAY BUTTON -->
  <button class="pay-btn" onclick="payNow()">Pay Now</button>

  <!-- SUCCESS -->
  <div class="success" id="successMsg">
    ✅ Payment Successful!
  </div>

  <!-- QR PAYMENT -->
  <div class="qr-box">
    <h3>Scan & Pay</h3>

    <!-- ⚠️ APNA QR IMAGE DAAL -->
    <img src="images/qr.png" alt="UPI QR Code">

    <p><b>UPI ID:</b> mathuraryan83@ptyes</p>

    <a href="upi://pay?pa=mathuraryan83@ptyes&pn=TravelSphere&cu=INR" class="upi-btn">
      Pay via UPI App
    </a>
  </div>

</div>

<script>
function selectMethod(el){
  document.querySelectorAll('.method').forEach(m => m.classList.remove('active'));
  el.classList.add('active');
}

function payNow(){
  const selected = document.querySelector('.method.active');
  if(!selected){
    alert("Please select a payment method!");
    return;
  }

  document.getElementById("successMsg").style.display = "block";
}
</script>

</body>
</html>
