<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment | TravelSphere</title>

<link rel="stylesheet" href="style.css">

<style>
body{
  margin:0;
  font-family:'Poppins', sans-serif;
  background:linear-gradient(135deg,#4facfe,#00f2fe);
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.payment-box{
  width:380px;
  background:white;
  padding:25px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.method{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;
  margin:8px 0;
  border-radius:10px;
  background:#f5f5f5;
  cursor:pointer;
}

.method.active{
  border:2px solid #6a5af9;
}

.method img{
  width:35px;
}

.pay-btn{
  margin-top:10px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:25px;
  background:linear-gradient(45deg,#ff7eb3,#6a5af9);
  color:white;
  cursor:pointer;
}

.qr-box img{
  width:180px;
  margin:10px 0;
}

.upi-btn{
  display:inline-block;
  margin-top:10px;
  padding:10px;
  background:#6a5af9;
  color:white;
  border-radius:20px;
  text-decoration:none;
}
</style>

</head>

<body>

<div class="payment-box">

  <h2>Select Payment Method</h2>

  <div class="method" onclick="selectMethod(this)">
    <img src="https://cdn-icons-png.flaticon.com/512/825/825454.png">
    Paytm
  </div>

  <div class="method" onclick="selectMethod(this)">
    <img src="https://cdn-icons-png.flaticon.com/512/5968/5968342.png">
    PhonePe
  </div>

  <div class="method" onclick="selectMethod(this)">
    <img src="https://cdn-icons-png.flaticon.com/512/6124/6124998.png">
    Google Pay
  </div>

  <button class="pay-btn" onclick="payNow()">Pay Now</button>

  <!-- QR -->
  <div class="qr-box">
    <h3>Scan & Pay</h3>
    <img src="images/qr.png">
    <p>UPI: mathuraryan83@ptyes</p>
  </div>

  <a href="upi://pay?pa=mathuraryan83@ptyes&pn=TravelSphere&cu=INR" class="upi-btn">
    Pay via UPI
  </a>

</div>

<script>
function selectMethod(el){
  document.querySelectorAll('.method').forEach(m => m.classList.remove('active'));
  el.classList.add('active');
}

function payNow(){
  alert("Payment Successful!");
  window.location.href = "receipt.html";
}
</script>

</body>
</html>
