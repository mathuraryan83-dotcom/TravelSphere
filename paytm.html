<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment | TravelSphere</title>

<link rel="stylesheet" href="style.css">

<style>
body{
  margin:0;
  font-family:'Poppins', sans-serif;
  background:linear-gradient(135deg,#4facfe,#00f2fe);
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

/* BOX */
.payment-box{
  width:360px;
  background:white;
  padding:30px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

/* TITLE */
.payment-box h2{
  margin-bottom:20px;
}

/* METHOD */
.method{
  display:flex;
  align-items:center;
  gap:15px;
  padding:12px;
  margin:10px 0;
  border-radius:12px;
  background:#f5f5f5;
  cursor:pointer;
  transition:0.3s;
}

.method:hover{
  background:#eaeaea;
}

.method.active{
  border:2px solid #6a5af9;
  background:#eef0ff;
}

/* LOGO */
.method img{
  width:40px;
}

/* BUTTON */
.pay-btn{
  margin-top:20px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:25px;
  background:linear-gradient(45deg,#ff7eb3,#6a5af9);
  color:white;
  font-size:16px;
  cursor:pointer;
}

/* SUCCESS */
.success{
  display:none;
  margin-top:15px;
  color:green;
  font-weight:bold;
}
</style>

</head>

<body>

<div class="payment-box">

  <h2>Select Payment Method</h2>

  <div class="method" onclick="selectMethod(this)">
    <img src="https://upload.wikimedia.org/wikipedia/commons/5/55/Paytm_logo.png">
    <span>Paytm</span>
  </div>
<div class="method" onclick="selectMethod(this)">
  <img src="https://cdn-icons-png.flaticon.com/512/825/825454.png">
  <span>Paytm</span>
</div>

<div class="method" onclick="selectMethod(this)">
  <img src="https://cdn-icons-png.flaticon.com/512/5968/5968342.png">
  <span>PhonePe</span>
</div>

<div class="method" onclick="selectMethod(this)">
  <img src="https://cdn-icons-png.flaticon.com/512/6124/6124998.png">
  <span>Google Pay</span>
</div>
  

  <button class="pay-btn" onclick="payNow()">Pay Now</button>

  <div class="success" id="successMsg">
    ✅ Payment Successful!
  </div>

</div>

<script>
function selectMethod(el){
  document.querySelectorAll('.method').forEach(m => m.classList.remove('active'));
  el.classList.add('active');
}

function payNow(){
  const selected = document.querySelector('.method.active');
  if(!selected){
    alert("Please select a payment method!");
    return;
  }

  document.getElementById("successMsg").style.display = "block";
}
</script>

</body>
</html>
