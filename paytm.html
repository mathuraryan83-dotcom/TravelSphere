<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment | TravelSphere</title>

<link rel="stylesheet" href="style.css">

<style>
body{
  margin:0;
  font-family:'Poppins', sans-serif;
  background:linear-gradient(135deg,#4facfe,#00f2fe);
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

/* BOX */
.payment-box{
  width:350px;
  background:white;
  padding:30px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

/* TITLE */
.payment-box h2{
  margin-bottom:20px;
}

/* METHOD */
.method{
  display:flex;
  align-items:center;
  gap:15px;
  padding:12px;
  margin:10px 0;
  border-radius:12px;
  background:#f5f5f5;
  cursor:pointer;
  transition:0.3s;
}

.method:hover{
  background:#eaeaea;
}

/* LOGO */
.method img{
  width:40px;
}

/* BUTTON */
.pay-btn{
  margin-top:20px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:25px;
  background:linear-gradient(45deg,#ff7eb3,#6a5af9);
  color:white;
  font-size:16px;
  cursor:pointer;
}

/* SUCCESS */
.success{
  display:none;
  margin-top:15px;
  color:green;
  font-weight:bold;
}
</style>

</head>

<body>

<div class="payment-box">

  <h2>Select Payment Method</h2>

  <div class="method">💳 Paytm</div>
  <div class="method">📱 PhonePe</div>
  <div class="method">💰 Google Pay</div>

  <button class="pay-btn" onclick="payNow()">Pay Now</button>

  <div class="success" id="successMsg">
    ✅ Payment Successful!
  </div>

</div>

<script>
function payNow(){
  document.getElementById("successMsg").style.display = "block";
}
</script>

</body>
</html>
