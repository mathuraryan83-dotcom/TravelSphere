<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Destinations | TravelSphere</title>

<link rel="stylesheet" href="style.css">

<style>
body{
  background:#f5f5f5;
}

/* PAGE TITLE */
.page-title{
  text-align:center;
  padding:120px 20px 40px;
}

.page-title h1{
  font-size:40px;
}

/* DESTINATION GRID */
.dest-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:25px;
  padding:20px 50px 80px;
}

/* CARD */
.dest-card{
  background:white;
  border-radius:20px;
  overflow:hidden;
  transition:0.3s;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.dest-card:hover{
  transform:translateY(-10px);
}

/* IMAGE */
.dest-card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

/* CONTENT */
.dest-content{
  padding:15px;
}

.dest-content h3{
  margin-bottom:5px;
}

.price{
  color:#ff7eb3;
  font-weight:bold;
}

/* BUTTON */
.book-btn{
  display:block;
  margin-top:10px;
  text-align:center;
  padding:10px;
  background:#ff7eb3;
  color:white;
  border-radius:20px;
  text-decoration:none;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<header>
  <div class="logo">TravelSphere</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="#">Destinations</a>
    <a href="booking.html">Booking</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<!-- TITLE -->
<section class="page-title">
  <h1>Explore Destinations</h1>
  <p>Choose your dream destination</p>
</section>

<!-- DESTINATIONS -->
<section class="dest-grid">

  <!-- CARD -->
  <div class="dest-card">
    <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e">
    <div class="dest-content">
      <h3>Maldives</h3>
      <p>4 Nights / 5 Days</p>
      <p class="price">₹25,000</p>
      <a href="booking.html" class="book-btn">Book Now</a>
    </div>
  </div>

  <div class="dest-card">
    <img src="https://images.unsplash.com/photo-1502602898657-3e91760cbb34">
    <div class="dest-content">
      <h3>Paris</h3>
      <p>5 Nights / 6 Days</p>
      <p class="price">₹55,000</p>
      <a href="booking.html" class="book-btn">Book Now</a>
    </div>
  </div>

  <div class="dest-card">
    <img src="https://images.unsplash.com/photo-1518684079-3c830dcef090">
    <div class="dest-content">
      <h3>Dubai</h3>
      <p>3 Nights / 4 Days</p>
      <p class="price">₹35,000</p>
      <a href="booking.html" class="book-btn">Book Now</a>
    </div>
  </div>

  <div class="dest-card">
    <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
    <div class="dest-content">
      <h3>Bali</h3>
      <p>5 Nights / 6 Days</p>
      <p class="price">₹40,000</p>
      <a href="booking.html" class="book-btn">Book Now</a>
    </div>
  </div>

</section>

</body>
</html>
